name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Prepare Windows package directory
        shell: pwsh
        run: |
          $packageDir = "build\windows\packaged"
          Remove-Item $packageDir -Recurse -Force -ErrorAction SilentlyContinue

          if (Test-Path "build\windows\x64\runner\Release") {
            $sourceDir = "build\windows\x64\runner\Release"
          } elseif (Test-Path "build\windows\runner\Release") {
            $sourceDir = "build\windows\runner\Release"
          } else {
            Write-Error "Could not find Windows build output directory"
            exit 1
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -Path "$sourceDir\*" -Destination $packageDir -Recurse

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path "build\windows\packaged\*" -DestinationPath "rawviewer-windows-${{ github.event.inputs.version }}.zip"

      - name: Build Windows Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: innosetup/rawviewer.iss
          options: >-
            /DMyAppVersion=${{ github.event.inputs.version }}
            /DMyOutputBaseFilename=rawviewer-windows-${{ github.event.inputs.version }}-setup

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: rawviewer-windows-${{ github.event.inputs.version }}.zip

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: rawviewer-windows-${{ github.event.inputs.version }}-setup.exe

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows ARM64
        run: flutter build windows --release

      - name: Prepare Windows package directory
        shell: pwsh
        run: |
          $packageDir = "build\windows\packaged"
          Remove-Item $packageDir -Recurse -Force -ErrorAction SilentlyContinue

          if (Test-Path "build\windows\arm64\runner\Release") {
            $sourceDir = "build\windows\arm64\runner\Release"
          } elseif (Test-Path "build\windows\runner\Release") {
            $sourceDir = "build\windows\runner\Release"
          } else {
            Write-Error "Could not find Windows build output directory"
            exit 1
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -Path "$sourceDir\*" -Destination $packageDir -Recurse

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path "build\windows\packaged\*" -DestinationPath "rawviewer-windows-arm64-${{ github.event.inputs.version }}.zip"

      - name: Build Windows Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: innosetup/rawviewer.iss
          options: >-
            /DMyAppVersion=${{ github.event.inputs.version }}
            /DMyOutputBaseFilename=rawviewer-windows-arm64-${{ github.event.inputs.version }}-setup

      - name: Upload Windows ARM64 Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-build
          path: rawviewer-windows-arm64-${{ github.event.inputs.version }}.zip

      - name: Upload Windows ARM64 Setup
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-setup
          path: rawviewer-windows-arm64-${{ github.event.inputs.version }}-setup.exe

  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Build macOS
        run: flutter build macos --release

      - name: Verify macOS universal binaries
        run: |
          APP_BINARY="build/macos/Build/Products/Release/rawviewer.app/Contents/MacOS/rawviewer"
          LIB_BINARY="build/macos/Build/Products/Release/rawviewer.app/Contents/Frameworks/libnative_lib.dylib"

          for BINARY in "$APP_BINARY" "$LIB_BINARY"; do
            if [ ! -f "$BINARY" ]; then
              echo "Expected binary not found: $BINARY"
              exit 1
            fi

            lipo -info "$BINARY"
            ARCHS="$(lipo -archs "$BINARY")"
            if [[ "$ARCHS" != *"arm64"* || "$ARCHS" != *"x86_64"* ]]; then
              echo "Expected a universal binary containing arm64 and x86_64, got: $ARCHS"
              exit 1
            fi
          done

      - name: Zip macOS build
        run: |
          APP_PATH="build/macos/Build/Products/Release/rawviewer.app"
          ZIP_PATH="rawviewer-macos-${{ github.event.inputs.version }}.zip"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find macOS app bundle at $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: rawviewer-macos-${{ github.event.inputs.version }}.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk rawviewer-android-${{ github.event.inputs.version }}.apk

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: rawviewer-android-${{ github.event.inputs.version }}.apk

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../rawviewer-linux-${{ github.event.inputs.version }}.zip .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: rawviewer-linux-${{ github.event.inputs.version }}.zip

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install flutter dependencies
        run: flutter pub get

      - name: Build Linux ARM64
        run: flutter build linux --release

      - name: Zip Linux build
        run: |
          cd build/linux/arm64/release/bundle
          zip -r ../../../../../rawviewer-linux-arm64-${{ github.event.inputs.version }}.zip .

      - name: Upload Linux ARM64 Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: rawviewer-linux-arm64-${{ github.event.inputs.version }}.zip

  release:
    name: Create Release
    needs: [build-windows, build-windows-arm64, build-macos, build-android, build-linux, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Windows Setup
        uses: actions/download-artifact@v4
        with:
          name: windows-setup

      - name: Download Windows ARM64 Build
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-build

      - name: Download Windows ARM64 Setup
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-setup

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Android Build
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Download Linux Build
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Download Linux ARM64 Build
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            rawviewer-windows-${{ github.event.inputs.version }}.zip
            rawviewer-windows-${{ github.event.inputs.version }}-setup.exe
            rawviewer-windows-arm64-${{ github.event.inputs.version }}.zip
            rawviewer-windows-arm64-${{ github.event.inputs.version }}-setup.exe
            rawviewer-macos-${{ github.event.inputs.version }}.zip
            rawviewer-android-${{ github.event.inputs.version }}.apk
            rawviewer-linux-${{ github.event.inputs.version }}.zip
            rawviewer-linux-arm64-${{ github.event.inputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
